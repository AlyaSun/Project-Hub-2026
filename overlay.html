<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjectHub 看板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: transparent;
    color: #1a1a2e;
    overflow: hidden;
    user-select: none;
  }

  .overlay-container {
    width: 100vw;
    height: 100vh;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Drag region - title bar */
  .overlay-header {
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: rgba(255, 255, 255, 0.3);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }
  .overlay-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a2e;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-app-region: no-drag;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .overlay-header h2:hover {
    opacity: 0.65;
  }
  .title-edit-input {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a2e;
    letter-spacing: 0.5px;
    border: 1.5px solid #185fa5;
    border-radius: 6px;
    padding: 2px 6px;
    outline: none;
    background: rgba(255,255,255,0.9);
    -webkit-app-region: no-drag;
    width: 180px;
    font-family: inherit;
  }
  .overlay-header .date-text {
    font-size: 11px;
    color: rgba(26, 26, 46, 0.5);
  }
  .overlay-header .btn-group {
    -webkit-app-region: no-drag;
    display: flex;
    gap: 6px;
  }
  .overlay-header .btn-icon {
    width: 24px;
    height: 24px;
    border: none;
    background: rgba(0,0,0,0.04);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    transition: all 0.15s;
  }
  .overlay-header .btn-icon:hover {
    background: rgba(0,0,0,0.08);
    color: #333;
  }

  /* Content area */
  .overlay-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    -webkit-app-region: no-drag;
  }
  .overlay-content::-webkit-scrollbar { width: 4px; }
  .overlay-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

  /* Task card */
  .task-card {
    background: rgba(255, 255, 255, 0.55);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
    border: 1px solid rgba(0, 0, 0, 0.04);
    cursor: pointer;
    transition: all 0.15s;
  }
  .task-card:hover {
    background: rgba(255, 255, 255, 0.85);
    border-color: rgba(24, 95, 165, 0.15);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .task-card.overdue { border-left: 3px solid #dc3545; }
  .task-card.urgent { border-left: 3px solid #e67e22; }
  .task-card.soon { border-left: 3px solid #f0ad4e; }
  .task-card.normal { border-left: 3px solid #18a058; }

  .task-name {
    font-size: 12.5px;
    font-weight: 500;
    color: #1a1a2e;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .task-meta {
    font-size: 10.5px;
    color: rgba(26, 26, 46, 0.5);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  .task-desc {
    font-size: 10.5px;
    color: rgba(26, 26, 46, 0.55);
    margin-top: 3px;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Next occurrence hint */
  .next-hint {
    font-size: 10px;
    color: rgba(26, 26, 46, 0.35);
    margin-left: 4px;
  }

  /* Done checkbox */
  .done-checkbox {
    -webkit-appearance: none;
    appearance: none;
    width: 15px;
    height: 15px;
    border: 1.5px solid rgba(0,0,0,0.2);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s;
    margin-right: 2px;
  }
  .done-checkbox:hover {
    border-color: #18a058;
    background: rgba(24, 160, 88, 0.08);
  }
  .done-checkbox:checked {
    background: #18a058;
    border-color: #18a058;
  }
  .done-checkbox:checked::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 10px;
    font-weight: bold;
  }

  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 500;
  }
  .badge-red { background: rgba(220,53,69,0.1); color: #dc3545; }
  .badge-amber { background: rgba(240,173,78,0.1); color: #e67e22; }
  .badge-blue { background: rgba(24,95,165,0.1); color: #185fa5; }
  .badge-purple { background: rgba(111,66,193,0.1); color: #6f42c1; }
  /* Status badges */
  .badge-status-inprogress { background: rgba(24,160,88,0.1); color: #18a058; }
  .badge-status-notstart { background: rgba(150,150,150,0.1); color: #888; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 20px;
    color: rgba(26, 26, 46, 0.3);
    font-size: 12px;
  }

  /* Refresh button */
  .refresh-btn {
    -webkit-app-region: no-drag;
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.6);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .refresh-btn:hover {
    background: rgba(255,255,255,0.9);
    transform: scale(1.1);
  }

  /* Opacity slider */
  .opacity-control {
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-app-region: no-drag;
  }
  .opacity-control label {
    font-size: 10px;
    color: rgba(26,26,46,0.4);
  }
  .opacity-control input[type="range"] {
    width: 60px;
    height: 3px;
    -webkit-appearance: none;
    background: rgba(0,0,0,0.1);
    border-radius: 3px;
    outline: none;
  }
  .opacity-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #185fa5;
    cursor: pointer;
  }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 14px;
    height: 14px;
    cursor: nwse-resize;
    -webkit-app-region: no-drag;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 8px;
    height: 8px;
    border-right: 2px solid rgba(0,0,0,0.15);
    border-bottom: 2px solid rgba(0,0,0,0.15);
  }
</style>
</head>
<body>
<div class="overlay-container" id="overlay">
  <div class="overlay-header">
    <div>
      <h2 id="board-title" onclick="editTitle()" title="点击编辑标题">📋 ProjectHub 看板</h2>
      <div class="date-text" id="date-text"></div>
    </div>
    <div class="btn-group">
      <div class="opacity-control">
        <label>透明</label>
        <input type="range" id="opacity-slider" min="30" max="100" value="72" onchange="setOpacity(this.value)">
      </div>
      <button class="btn-icon" onclick="refreshTasks()" title="刷新">🔄</button>
      <button class="btn-icon" onclick="togglePin()" id="pin-btn" title="置顶切换">📌</button>
    </div>
  </div>

  <div class="overlay-content" id="task-list">
    <div class="empty-state">加载中...</div>
  </div>

  <button class="refresh-btn" onclick="refreshTasks()" title="刷新数据">↻</button>
  <div class="resize-handle"></div>
</div>

<script>
// ============ Data Layer ============
const STORAGE_KEY = 'projecthub_tasks';
const TITLE_KEY = 'projecthub_board_title';
const DEFAULT_TITLE = '📋 ProjectHub 看板';
const WEEKDAYS = ['日','一','二','三','四','五','六'];

function loadTasks() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function loadBoardTitle() {
  return localStorage.getItem(TITLE_KEY) || DEFAULT_TITLE;
}

function saveBoardTitle(title) {
  localStorage.setItem(TITLE_KEY, title);
}

// ============ Title Edit ============
let isEditingTitle = false;

function editTitle() {
  if (isEditingTitle) return;
  isEditingTitle = true;

  const el = document.getElementById('board-title');
  const currentText = loadBoardTitle();

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'title-edit-input';
  input.value = currentText.replace(/^[^\s]+\s/, '');
  input.placeholder = '输入看板名称';

  const wrapper = document.createElement('span');
  wrapper.style.cssText = 'display:inline-flex;align-items:center;gap:0;';
  wrapper.innerHTML = '📋 ';
  wrapper.appendChild(input);

  el.parentNode.replaceChild(wrapper, el);
  wrapper.id = 'board-title';
  input.focus();
  input.select();

  function finishEdit(save) {
    if (!isEditingTitle) return;
    isEditingTitle = false;
    let newTitle;
    if (save && input.value.trim()) {
      newTitle = '📋 ' + input.value.trim();
      saveBoardTitle(newTitle);
    } else {
      newTitle = loadBoardTitle();
    }

    const h2 = document.createElement('h2');
    h2.id = 'board-title';
    h2.textContent = newTitle;
    h2.setAttribute('onclick', 'editTitle()');
    h2.setAttribute('title', '点击编辑标题');
    wrapper.parentNode.replaceChild(h2, wrapper);
  }

  input.addEventListener('blur', () => finishEdit(true));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { finishEdit(false); }
  });
}

document.getElementById('board-title').textContent = loadBoardTitle();

// ============ Helpers ============
function daysUntil(ddl) {
  if (!ddl) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(ddl + 'T00:00:00');
  return Math.ceil((d - now) / 86400000);
}

function weekdayOf(ddl) {
  if (!ddl) return '';
  const d = new Date(ddl + 'T00:00:00');
  return WEEKDAYS[d.getDay()];
}

function urgencyLevel(t) {
  const d = daysUntil(t.ddl);
  if (d === null) return 'normal';
  if (d < 0) return 'overdue';
  if (d === 0) return 'urgent';
  if (d <= 3) return 'soon';
  return 'normal';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Calculate the next occurrence date after the current DDL
function calcNextOccurrence(recurring, currentDdl) {
  if (!recurring || !recurring.enabled || !currentDdl) return null;

  const base = new Date(currentDdl + 'T00:00:00');
  let next;

  switch (recurring.type) {
    case 'weekly':
      next = new Date(base.getTime() + 7 * 86400000);
      break;
    case 'monthly':
      next = new Date(base.getFullYear(), base.getMonth() + 1, recurring.day || base.getDate());
      // Handle months where the day doesn't exist (e.g. Feb 31 → Mar 3)
      if (next.getMonth() !== (base.getMonth() + 1) % 12) {
        next = new Date(base.getFullYear(), base.getMonth() + 2, 0); // last day of next month
      }
      break;
    case 'quarterly':
      const qMonth = recurring.quarterMonth || 1; // 1, 2, or 3
      // Current DDL tells us which quarter we're in
      // Next quarter: add 3 months, keep same quarterMonth offset
      const currentQuarter = Math.floor(base.getMonth() / 3);
      const nextQuarter = currentQuarter + 1;
      const nextMonth = nextQuarter * 3 + (qMonth - 1);
      const nextYear = nextMonth >= 12 ? base.getFullYear() + 1 : base.getFullYear();
      const adjustedMonth = nextMonth % 12;
      next = new Date(nextYear, adjustedMonth, recurring.day || base.getDate());
      if (next.getMonth() !== adjustedMonth) {
        next = new Date(nextYear, adjustedMonth + 1, 0); // last day of that month
      }
      break;
    case 'yearly':
      next = new Date(base.getFullYear() + 1, base.getMonth(), recurring.day || base.getDate());
      if (next.getMonth() !== base.getMonth()) {
        next = new Date(base.getFullYear() + 1, base.getMonth() + 1, 0);
      }
      break;
    default:
      return null;
  }

  const mm = String(next.getMonth() + 1).padStart(2, '0');
  const dd = String(next.getDate()).padStart(2, '0');
  const wd = WEEKDAYS[next.getDay()];
  return `${mm}/${dd}(${wd})`;
}

// ============ Render ============
function refreshTasks() {
  const tasks = loadTasks();
  const now = new Date();
  document.getElementById('date-text').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${WEEKDAYS[now.getDay()]}`;

  // Filter: only non-done tasks
  const activeTasks = tasks.filter(t => t.status !== 'done');

  // Deduplicate recurring tasks: for same project name, only keep the nearest instance
  const recurringSeen = {};
  const dedupedTasks = [];

  // First pass: sort by DDL to ensure nearest comes first
  activeTasks.sort((a, b) => {
    const da = daysUntil(a.ddl);
    const db = daysUntil(b.ddl);
    if (da !== null && db !== null) return da - db;
    if (da !== null) return -1;
    if (db !== null) return 1;
    return 0;
  });

  activeTasks.forEach(t => {
    if (t.recurring && t.recurring.enabled) {
      const key = t.project;
      if (recurringSeen[key]) {
        // Skip - we already have the nearest instance
        return;
      }
      recurringSeen[key] = true;
    }
    dedupedTasks.push(t);
  });

  // Final sort by DDL ascending
  dedupedTasks.sort((a, b) => {
    const da = daysUntil(a.ddl);
    const db = daysUntil(b.ddl);
    if (da !== null && db !== null) return da - db;
    if (da !== null) return -1;
    if (db !== null) return 1;
    return 0;
  });

  if (dedupedTasks.length === 0) {
    document.getElementById('task-list').innerHTML =
      '<div class="empty-state">✅ 没有待办任务<br><span style="font-size:10px;margin-top:4px;display:block;">在主窗口添加任务后这里会自动更新</span></div>';
    return;
  }

  let html = '';
  dedupedTasks.forEach(t => {
    html += renderTaskCard(t);
  });

  document.getElementById('task-list').innerHTML = html;
}

function renderTaskCard(t) {
  const d = daysUntil(t.ddl);
  const wd = weekdayOf(t.ddl);
  const cardClass = urgencyLevel(t);

  // DDL badge with weekday
  let ddlText = '';
  if (d !== null) {
    const wdSuffix = wd ? `(${wd})` : '';
    if (d < 0) ddlText = `<span class="badge badge-red">逾期${Math.abs(d)}天${wdSuffix}</span>`;
    else if (d === 0) ddlText = `<span class="badge badge-amber">今天${wdSuffix}</span>`;
    else if (d === 1) ddlText = `<span class="badge badge-amber">明天${wdSuffix}</span>`;
    else ddlText = `<span class="badge badge-blue">${d}天后${wdSuffix}</span>`;
  }

  // Next occurrence hint for recurring tasks
  let nextHint = '';
  if (t.recurring && t.recurring.enabled) {
    const nextDate = calcNextOccurrence(t.recurring, t.ddl);
    if (nextDate) {
      nextHint = `<span class="next-hint">→下次: ${nextDate}</span>`;
    }
  }

  // Status tag
  const isProgress = t.status === 'in_progress';
  const statusTag = isProgress
    ? '<span class="badge badge-status-inprogress">● 进行中</span>'
    : '<span class="badge badge-status-notstart">○ 未开始</span>';

  // Description
  const desc = t.desc ? `<div class="task-desc">${escHtml(t.desc)}</div>` : '';

  return `<div class="task-card ${cardClass}">
    <div class="task-name">
      <input type="checkbox" class="done-checkbox" onchange="markDone('${t.id}', this.checked)" title="勾选完成">
      <span style="flex:1;cursor:pointer" onclick="openInMainApp('${t.id}')">${escHtml(t.project)}</span>
      ${statusTag}
      ${t.priority === 'high' ? '<span class="badge badge-red">高优</span>' : ''}
    </div>
    ${desc}
    <div class="task-meta">
      ${ddlText}
      ${nextHint}
      ${t.tag ? `<span class="badge badge-purple">${escHtml(t.tag)}</span>` : ''}
    </div>
  </div>`;
}

function openInMainApp(taskId) {
  if (window.electronAPI && window.electronAPI.openTask) {
    window.electronAPI.openTask(taskId);
  }
}

async function markDone(taskId, checked) {
  if (!checked) return;
  if (window.electronAPI && window.electronAPI.markTaskDone) {
    const result = await window.electronAPI.markTaskDone(taskId);
    if (result.success) {
      refreshTasks();
    }
  }
}

function setOpacity(val) {
  const overlay = document.getElementById('overlay');
  overlay.style.background = `rgba(255, 255, 255, ${val / 100})`;
}

let isPinned = true;
function togglePin() {
  isPinned = !isPinned;
  document.getElementById('pin-btn').textContent = isPinned ? '📌' : '📍';
  if (window.electronAPI && window.electronAPI.toggleAlwaysOnTop) {
    window.electronAPI.toggleAlwaysOnTop(isPinned);
  }
}

// ============ Auto-refresh ============
refreshTasks();
setInterval(refreshTasks, 60000);

window.addEventListener('storage', (e) => {
  if (e.key === STORAGE_KEY) refreshTasks();
});
</script>
</body>
</html>
